  <!-- Center dot -->
  <circle cx="256" cy="248" r="42" fill="#7c3aed" opacity="0.85"/>
  <circle cx="256" cy="248" r="24" fill="#c084fc"/>

  <!-- App name -->
  <text x="256" y="446" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="58" font-weight="800" letter-spacing="-1"
    fill="white" opacity="0.95">SQUISHY</text>
