<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="#7c3aed"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="248" r="152" fill="#a855f7" opacity="0.4"/>

  <!-- Main squishy ball -->
  <circle cx="256" cy="248" r="135" fill="#fdf4ff"/>

  <!-- Inner color -->
  <circle cx="256" cy="248" r="105" fill="#ede9fe"/>

  <!-- Shine highlight -->
